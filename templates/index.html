<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>US-SS-AGENCY | Dashboard</title>
    <style>
        body {
            background-color: #0a0a0c;
            color: #e2e8f0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: #111115;
            border: 1px solid #22222a;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
            text-align: center;
        }
        h1 {
            color: #38bdf8;
            font-size: 1.8rem;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        .status-badge {
            display: inline-block;
            background-color: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            border: 1px solid rgba(34, 197, 94, 0.3);
            margin-bottom: 25px;
        }
        .panel {
            background: #070709;
            border: 1px solid #1c1c24;
            padding: 15px;
            border-radius: 6px;
            text-align: left;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }
        .panel p { margin: 8px 0; }
        .accent { color: #f59e0b; }
        .btn-group {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }
        button {
            background: #38bdf8;
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 4px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #0ea5e9; }
        button.secondary {
            background: #1e293b;
            color: #cbd5e1;
            border: 1px solid #334155;
        }
        button.secondary:hover { background: #334155; }
    </style>
</head>
<body>
    <div class="container">
        <h1>US-SS-AGENCY</h1>
        <div class="status-badge">⚡ CORE ONLINE</div>
        
        <div class="panel">
            <p><strong>SISTEMA:</strong> <span class="accent">Búnker Autónomo Humanless</span></p>
            <p><strong>CONEXIÓN:</strong> Motor Gemini AI Vinculado</p>
            <p><strong>ENTORNO:</strong> Producción Global Activa</p>
        </div>

        <div class="btn-group">
            <button onclick="alert('Iniciando enlace con la IA...')">Acceder al Canal IA</button>
            <button class="secondary" onclick="alert('Pasarela de cobro en mantenimiento')">Procesar Pago Comercial</button>
        </div>
    </div>
</body>
</html>
