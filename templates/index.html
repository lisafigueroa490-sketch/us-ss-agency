<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BETH OS | SMART COMMAND CENTER</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --neon-blue: #00f0ff;
            --neon-amber: #ffaa00;
            --neon-green: #00ff66;
            --dark-bg: #03070d;
            --panel-bg: rgba(6, 14, 26, 0.9);
        }
        body {
            background-color: var(--dark-bg);
            color: #d1f4ff;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .main-container {
            width: 100%;
            max-width: 800px;
            background: var(--panel-bg);
            border: 1px solid rgba(0, 240, 255, 0.15);
            border-radius: 6px;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        h1 { font-size: 1.4rem; letter-spacing: 3px; color: #fff; text-shadow: 0 0 8px var(--neon-blue); }
        
        .tier-selector {
            background: rgba(0,240,255,0.05);
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 10px;
            font-family: inherit;
            width: 100%;
            margin-bottom: 15px;
            border-radius: 4px;
        }
        option { background: #060e1a; color: #fff; }

        .matrix-btn {
            background: rgba(0, 240, 255, 0.03);
            color: #a3e8ff;
            border: 1px solid rgba(0, 240, 255, 0.3);
            padding: 12px;
            width: 100%;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .matrix-btn:hover {
            background: rgba(0, 240, 255, 0.15);
            border-color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="main-container">
        <h1>BETH OS / SYSTEM MULTI-TIER</h1>
        
        <form action="/api/finance/manager" method="POST">
            <label for="tier" style="display:block; margin-bottom:10px; font-size:0.8rem;">[SELECCIONAR ESCALAFÓN DE ACCESO]</label>
            <select name="tier" id="tier" class="tier-selector">
                <option value="free">Tier Free ($0.00)</option>
                <option value="low">Low Level ($0.50)</option>
                <option value="medium">Medium Level ($5.00)</option>
                <option value="high">High Level ($15.00)</option>
                <option value="next_level">Next Level ($50.00)</option>
                <option value="1">Level 1 (80/20 Clone System)</option>
                <option value="2">Level 2 (80/20 Clone System)</option>
                <option value="3">Level 3 (80/20 Clone System)</option>
            </select>
            
            <button type="submit" class="matrix-btn">Activar Módulo y Procesar Canal</button>
        </form>
    </div>
</body>
</html>
